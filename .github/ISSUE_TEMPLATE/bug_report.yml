name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Include steps to reproduce and what you expected vs what happened.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: URLs, clicks, form values, or commands.
      placeholder: |
        1. Sign in as `alice` (dev)
        2. Open `/write`
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Quarkus profile (`dev` / `prod`), commit or version if known.
      placeholder: |
        - Chrome 148 / Linux
        - `./mvnw quarkus:dev` or Docker image tag
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Stack traces, browser console, or screenshots (drag and drop).
