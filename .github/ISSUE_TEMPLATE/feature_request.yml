name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and the outcome you want. If it affects authors, readers, or editors, say which persona.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What pain does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work from the user's perspective?
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Guest (not signed in)
        - Author (USER)
        - Editor (EDITOR)
        - Platform admin
        - Multiple / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
