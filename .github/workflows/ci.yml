name: Continuous Integration

on:
  push:
  pull_request:

run-name: >-
  CI · ${{ github.ref_name }} · ${{ github.sha }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: zulu
  MAVEN_CLI_OPTS: -B --no-transfer-progress

jobs:
  code-style:
    name: Code Style · Spotless
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Verify Java formatting (Spotless)
        run: mvn ${{ env.MAVEN_CLI_OPTS }} spotless:check

  tests:
    name: Tests · ${{ matrix.display }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: code-style
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            profile: test-unit
            display: Unit
            browser: false
          - suite: quarkus
            profile: test-quarkus
            display: Quarkus Integration
            browser: false
          - suite: web-auth
            profile: test-web-shard
            display: Web · Auth
            browser: true
            web_shard: web-auth
            test_port: 8082
          - suite: web-author
            profile: test-web-shard
            display: Web · Author
            browser: true
            web_shard: web-author
            test_port: 8083
          - suite: web-reader
            profile: test-web-shard
            display: Web · Reader
            browser: true
            web_shard: web-reader
            test_port: 8084
          - suite: web-platform
            profile: test-web-shard
            display: Web · Platform
            browser: true
            web_shard: web-platform
            test_port: 8085
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Chrome
        if: matrix.browser
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run Maven tests (${{ matrix.profile }})
        env:
          GITHUB_ACTIONS: true
        run: |
          EXTRA=""
          if [ -n "${{ matrix.web_shard }}" ]; then
            EXTRA="-Dweb.shard=${{ matrix.web_shard }} -Dquarkus.http.test-port=${{ matrix.test_port }}"
          fi
          mvn ${{ env.MAVEN_CLI_OPTS }} test -P${{ matrix.profile }} $EXTRA

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            target/surefire-reports/TEST-*.xml
            target/surefire-reports/**/*.txt
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6

      - name: Stage JaCoCo execution data
        if: success()
        run: |
          mkdir -p target/jacoco-upload
          cp target/jacoco-quarkus.exec "target/jacoco-upload/jacoco-${{ matrix.suite }}.exec"

      - name: Upload JaCoCo execution data
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-${{ matrix.suite }}
          path: target/jacoco-upload/jacoco-${{ matrix.suite }}.exec
          retention-days: 1
          if-no-files-found: error

  test-report:
    name: Quality · Test Results Summary
    runs-on: ubuntu-latest
    needs:
      - tests
      - docker-smoke
    if: always() && !cancelled()
    timeout-minutes: 10
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download JUnit artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: true

      - name: Publish results to GitHub Checks
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          check_name: Maven · All Test Suites
          files: test-results/**/TEST-*.xml
          comment_mode: failures
          report_suite_logs: error

  build:
    name: Build · JVM Package & Static Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: tests
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Package application (minify gate)
        run: mvn ${{ env.MAVEN_CLI_OPTS }} package -DskipTests

      - name: Upload Quarkus application bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-quarkus-app
          path: target/quarkus-app/
          retention-days: 7
          compression-level: 6

      - name: Record build metadata
        run: |
          {
            echo "## Build metadata"
            echo "- **Ref:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Maven version:** \`$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)\`"
            echo "- **Artifact:** \`target/quarkus-app/\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-smoke:
    name: Tests · Docker Smoke (Testcontainers)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Map smoke hostnames
        run: |
          echo "127.0.0.1 blogs.commit-mestre.test admin.commit-mestre.test" | sudo tee -a /etc/hosts

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Download Quarkus application bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-quarkus-app
          path: target/quarkus-app/

      - name: Build JVM container image for smoke tests
        run: docker build -f src/main/docker/Dockerfile.jvm -t contraponto:ci-smoke .

      - name: Run docker-smoke integration tests
        env:
          GITHUB_ACTIONS: true
        run: mvn ${{ env.MAVEN_CLI_OPTS }} verify -Ptest-it -Dcontraponto.smoke.image=contraponto:ci-smoke

      - name: Upload Failsafe test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-docker-smoke
          path: |
            target/failsafe-reports/TEST-*.xml
            target/failsafe-reports/**/*.txt
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6

  quality-sonar:
    name: Quality · SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: tests
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Cache SonarCloud scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4.2.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Download JaCoCo execution data
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: jacoco-*
          path: target/jacoco-parts
          merge-multiple: true

      - name: Merge coverage and run SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn ${{ env.MAVEN_CLI_OPTS }} compile -DskipTests
          mvn ${{ env.MAVEN_CLI_OPTS }} jacoco:merge@default-merge
          mvn ${{ env.MAVEN_CLI_OPTS }} jacoco:report org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.projectKey=vepo_contraponto

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            target/jacoco-report/jacoco.xml
            target/jacoco-report/index.html
            target/jacoco-report/
          retention-days: 30
          if-no-files-found: warn

  release-docker:
    name: Release · Docker Hub (JVM)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs:
      - build
      - docker-smoke
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Download Quarkus application bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-quarkus-app
          path: target/quarkus-app/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3.8.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5.6.0
        with:
          images: vepo/contraponto
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.1.0
        with:
          context: .
          file: ./src/main/docker/Dockerfile.jvm
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record release metadata
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Container release"
            echo "- **Image:** \`vepo/contraponto\`"
            echo "- **Tags:**"
            echo "${DOCKER_TAGS}" | while read -r tag; do
              [ -n "${tag}" ] && echo "  - \`${tag}\`"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
