name: Continuous Integration

on:
  push:
  pull_request:

run-name: >-
  CI · ${{ github.ref_name }} · ${{ github.sha }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: zulu
  MAVEN_CLI_OPTS: -B --no-transfer-progress

permissions:
  contents: read

jobs:
  code-style:
    name: Code Style · Spotless
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Verify Java formatting (Spotless)
        run: mvn ${{ env.MAVEN_CLI_OPTS }} spotless:check

  tests:
    name: Tests · ${{ matrix.display }}
    runs-on: ubuntu-latest
    needs: code-style
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            profile: test-unit
            display: Unit
            browser: false
          - suite: quarkus
            profile: test-quarkus
            display: Quarkus Integration
            browser: false
          - suite: web
            profile: test-web
            display: Web · Headless Chrome
            browser: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Chrome
        if: matrix.browser
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run Maven tests (${{ matrix.profile }})
        env:
          GITHUB_ACTIONS: true
        run: mvn ${{ env.MAVEN_CLI_OPTS }} test -P${{ matrix.profile }}

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            target/surefire-reports/**/*.xml
            target/surefire-reports/**/*.txt
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6

      - name: Stage JaCoCo execution data
        if: success()
        run: |
          mkdir -p target/jacoco-upload
          cp target/jacoco-quarkus.exec "target/jacoco-upload/jacoco-${{ matrix.suite }}.exec"

      - name: Upload JaCoCo execution data
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jacoco-${{ matrix.suite }}
          path: target/jacoco-upload/jacoco-${{ matrix.suite }}.exec
          retention-days: 1
          if-no-files-found: error

  test-report:
    name: Quality · Test Results Summary
    runs-on: ubuntu-latest
    needs:
      - tests
      - docker-smoke
    if: always() && !cancelled()
    timeout-minutes: 10
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download JUnit artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: true

      - name: Publish results to GitHub Checks
        uses: EnricoMi/publish-unit-test-result-action@v2 # v2.24.0
        if: always()
        with:
          check_name: Maven · All Test Suites
          files: test-results/**/*.xml
          comment_mode: failures
          report_suite_logs: error

  build:
    name: Build · JVM Package & Static Assets
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Package application (minify gate)
        run: mvn ${{ env.MAVEN_CLI_OPTS }} package -DskipTests

      - name: Upload Quarkus application bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-quarkus-app
          path: target/quarkus-app/
          retention-days: 7
          compression-level: 6

      - name: Record build metadata
        run: |
          {
            echo "## Build metadata"
            echo "- **Ref:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Maven version:** \`$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)\`"
            echo "- **Artifact:** \`target/quarkus-app/\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-smoke:
    name: Tests · Docker Smoke (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Map smoke hostnames
        run: |
          echo "127.0.0.1 blogs.commit-mestre.test admin.commit-mestre.test" | sudo tee -a /etc/hosts

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Download Quarkus application bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-quarkus-app
          path: target/quarkus-app/

      - name: Build JVM container image for smoke tests
        run: docker build -f src/main/docker/Dockerfile.jvm -t contraponto:ci-smoke .

      - name: Run docker-smoke integration tests
        env:
          GITHUB_ACTIONS: true
        run: mvn ${{ env.MAVEN_CLI_OPTS }} verify -Ptest-it -Dcontraponto.smoke.image=contraponto:ci-smoke

      - name: Upload Failsafe test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-docker-smoke
          path: |
            target/failsafe-reports/**/*.xml
            target/failsafe-reports/**/*.txt
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6

  quality-sonar:
    name: Quality · SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: tests
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Cache SonarCloud scanner
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v4.2.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Download JaCoCo execution data
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: jacoco-*
          path: target/jacoco-parts
          merge-multiple: true

      - name: Merge coverage and run SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn ${{ env.MAVEN_CLI_OPTS }} compile -DskipTests
          mvn ${{ env.MAVEN_CLI_OPTS }} jacoco:merge@default-merge
          mvn ${{ env.MAVEN_CLI_OPTS }} jacoco:report org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.projectKey=vepo_contraponto

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            target/jacoco-report/jacoco.xml
            target/jacoco-report/index.html
            target/jacoco-report/
          retention-days: 30
          if-no-files-found: warn

  release-docker:
    name: Release · Docker Hub (JVM)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs:
      - build
      - docker-smoke
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Download Quarkus application bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-quarkus-app
          path: target/quarkus-app/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3.8.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5.6.0
        with:
          images: vepo/contraponto
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.1.0
        with:
          context: .
          file: ./src/main/docker/Dockerfile.jvm
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record release metadata
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Container release"
            echo "- **Image:** \`vepo/contraponto\`"
            echo "- **Tags:**"
            echo "${DOCKER_TAGS}" | while read -r tag; do
              [ -n "${tag}" ] && echo "  - \`${tag}\`"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
