name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [unit, quarkus, web]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded
        if: matrix.tag == 'web'

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 25
          distribution: zulu
          cache: maven

      - name: Run tests
        run: mvn -B test -Ptest-${{ matrix.tag }}

  docker:
    name: Build container image (JVM)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 25
          distribution: zulu
          cache: maven

      - name: Compile application
        run: mvn -B -DskipTests package

      - name: Build container image (JVM)
        run: docker build -f src/main/docker/Dockerfile.jvm -t contraponto:jvm .
