name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [unit, quarkus, web]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd
        if: matrix.tag == 'web'
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: zulu
          cache: maven

      - name: Run tests
        run: mvn -B test -Ptest-${{ matrix.tag }}

  docker:
    name: Build container image (JVM)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: zulu
          cache: maven

      - name: Compile application
        run: mvn -B -DskipTests package

      - name: Build container image (JVM)
        run: docker build -f src/main/docker/Dockerfile.jvm -t contraponto:jvm .
