name: CI

on:
  push:
  pull_request:

jobs:
  build-test-docker:
    name: Build, test, and Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 25
          distribution: zulu
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Build container image (JVM)
        run: docker build -f src/main/docker/Dockerfile.jvm -t contraponto:jvm .
