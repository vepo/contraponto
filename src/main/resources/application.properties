# Configuração do Hibernate
quarkus.datasource.db-kind=postgresql
%dev.quarkus.hibernate-orm.database.generation=validate
%dev,test.quarkus.hibernate-orm.log.bind-parameters=true
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.datasource.dev-ui.allow-sql=true

# Flyway Configuration
quarkus.flyway.locations=db/migration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.out-of-order=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.clean-disabled=false

# Public site origin (emails, sanitized HTML links). Override in prod via APP_PUBLIC_URL.
image.base.url=${APP_PUBLIC_URL:http://localhost:8080}

# Application — portable flags (not tied to quarkus.profile in code)
app.show-error-details=false
%dev.app.show-error-details=true
app.dev-import.enabled=false
%dev.app.dev-import.enabled=true
app.secure-cookies=false
%prod.app.secure-cookies=true
# Session store: memory (default, single instance) or redis (multi-instance; requires quarkus.redis.hosts)
app.session.store=memory
app.session.ttl-seconds=2592000
%test.app.session.store=memory
# Redis extension is on the classpath; hosts required even when app.session.store=memory
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.devservices.enabled=false
%test.quarkus.redis.devservices.enabled=true
# RSS feed XML cache (invalidated on PostPublishedEvent)
quarkus.cache.caffeine."rss-feeds".expire-after-write=5M
quarkus.cache.caffeine."rss-feeds".maximum-size=200
app.notifications.badge-poll-interval=60s
app.notifications.overlay-limit=10
app.rate-limit.max-requests=30
app.rate-limit.window-seconds=60
contraponto.highlight.common-threshold=3
contraponto.highlight.max-per-user-per-post=20
contraponto.highlight.max-passage-length=500
contraponto.highlight.max-note-length=1000
contraponto.highlight.max-notes-per-highlight=5
contraponto.highlight.max-pending-public-notes-per-post=3

#################################
## OpenAPI                     ##
#################################
quarkus.smallrye-openapi.path=/openapi.yaml
quarkus.swagger-ui.always-include=false
%dev.quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.footer=&#169; 2026 Contraponto - https://vepo.dev
quarkus.swagger-ui.path=/openapi
quarkus.swagger-ui.title=Contraponto - API
# Logging — WARN for framework, DEBUG for application code
quarkus.log.level=WARN
quarkus.log.category."dev.vepo.contraponto".level=DEBUG
quarkus.hibernate-orm.log.format-sql=false
quarkus.hibernate-orm.*.log.format-sql=false
quarkus.hibernate-orm.*.log.highlight-sql=false

# Git / Jekyll sync — see docs/git-jekyll-convention.md (optional: workspace-root, username, password)
contraponto.git.poll-enabled=true
contraponto.git.poll-interval=2m
contraponto.git.clone-depth=1
%prod.contraponto.git.poll-enabled=false
%test.contraponto.git.poll-enabled=true
%test.quarkus.scheduler.enabled=true

# Mailer — production: set QUARKUS_MAILER_* env vars (see docs/deployment.md)
quarkus.mailer.from=noreply@contraponto.blog
app.account-token.password-reset-hours=1
app.account-token.email-change-hours=24
%test.quarkus.mailer.mock=true
%dev.quarkus.mailer.from=contato@contraponto.blog
%dev.quarkus.mailer.mock=true

# Production profile
%prod.app.show-error-details=false
%prod.app.dev-import.enabled=false
%prod.quarkus.swagger-ui.always-include=false
%prod.quarkus.log.category."dev.vepo.contraponto".level=INFO
%prod.image.base.url=${APP_PUBLIC_URL}