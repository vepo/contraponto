# Configuração do Hibernate
quarkus.datasource.db-kind=postgresql
%dev.quarkus.hibernate-orm.database.generation=validate
%dev,test.quarkus.hibernate-orm.log.bind-parameters=true
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.datasource.dev-ui.allow-sql=true

# Flyway Configuration
quarkus.flyway.locations=db/migration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.out-of-order=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.clean-disabled=false

# JWT Configuration
quarkus.jwt.token.issuer=contraponto
quarkus.jwt.token.lifetime=86400
quarkus.jwt.token.lifetime.grace=60

# JWT token signature
smallrye.jwt.sign.key.location=/privateKey.pem
smallrye.jwt.encrypt.key.location=/publicKey.pem

# Generate keys for development
smallrye.jwt.new-token.issuer=contraponto
smallrye.jwt.new-token.lifespan=86400

# HTTP Security Configuration
# Public paths - no authentication required
quarkus.http.auth.permission.public.paths=/api/auth/*,/post/*,/,/style/*,/js/*,/write
quarkus.http.auth.permission.public.policy=permit

# Protected API paths - require authentication
quarkus.http.auth.permission.authenticated.paths=/api/profile,/api/posts/*,/api/images/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Image storage configuration
image.storage.path=/tmp/contraponto-images
image.base.url=http://localhost:8080