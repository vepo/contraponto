<header class="hub-panel__header message-report-detail-page__header">
    <div class="hub-panel__header-text">
        <h2 class="hub-panel__title">{detail.report.thread.title}</h2>
        <p class="hub-panel__subtitle message-report-detail-page__meta">
            <span data-i18n="administration.messageReports.reporter">Denunciante:</span>
            {detail.report.reporter.name} (@{detail.report.reporter.username})
        </p>
    </div>
</header>

<section class="message-thread-page__messages" aria-label="Reported thread snapshot">
    {#for message in detail.messages}
    <article class="message-thread-message">
        <header class="message-thread-message__header">
            <span class="message-thread-message__author">{message.author.name}</span>
            <time class="message-thread-message__time">{message.createdAt.format('dd/MM/yyyy HH:mm')}</time>
        </header>
        <p class="message-thread-message__body">{message.body}</p>
    </article>
    {/for}
</section>

<div class="form-actions">
    <form hx-post="/forms/administration/message-reports/{detail.report.id}/dismiss"
          hx-select="main"
          hx-target="main"
          hx-swap="outerHTML"
          hx-push-url="/administration/message-reports"
          hx-target-error="#toast"
          hx-swap-error="innerHTML">
        <button type="submit" class="btn btn--outline" data-i18n="administration.messageReports.dismiss">Dispensar</button>
    </form>
    <form hx-post="/forms/administration/message-reports/{detail.report.id}/reviewed"
          hx-select="main"
          hx-target="main"
          hx-swap="outerHTML"
          hx-push-url="/administration/message-reports"
          hx-target-error="#toast"
          hx-swap-error="innerHTML">
        <button type="submit" class="btn btn--primary" data-i18n="administration.messageReports.reviewed">Marcar revisada</button>
    </form>
    <a href="/administration/message-reports" data-hx-get="/administration/message-reports"
       hx-select="main"
       hx-target="main"
       hx-swap="outerHTML"
       hx-push-url="/administration/message-reports"
       class="btn btn--secondary"
       data-i18n="common.back">Voltar</a>
</div>
