<html>
    <head>
        <link rel="stylesheet" href="/style/post.css"/>
    </head>
    <body>
        <header class="site-header">
            <div class="header-container">
                <div class="nav-left">
                    <button class="menu-button" aria-label="Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                
                <div class="logo">
                    <a href="/">contraponto</a>
                </div>
                
                <div class="nav-right">
                    <button class="search-button" aria-label="Search">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="write-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>Write</span>
                    </button>
                </div>
            </div>
        </header>
        <div class="content">
            {#for post in posts}
            {/for}
        </div>
    </body>
</html>
