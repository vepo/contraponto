<header class="hub-panel__header">
    <div class="hub-panel__header-text">
        <h2 class="hub-panel__title" data-i18n="messaging.compose.title">Nova mensagem</h2>
    </div>
</header>

<form class="message-compose-form form-group-stack"
      hx-post="/forms/messages/compose"
      hx-select="main"
      hx-target="main"
      hx-swap="outerHTML"
      hx-target-error="#toast"
      hx-swap-error="innerHTML">
    <div class="form-group">
        <label for="compose-to" data-i18n="messaging.compose.to">Para</label>
        <input id="compose-to" name="to" type="text" required maxlength="64"
               value="{recipientUsername ?: ''}"
               placeholder="username"
               list="compose-recipient-suggestions"
               autocomplete="off"
               {#if recipient}readonly{#else}
               hx-get="/components/messages/recipient-suggestions"
               hx-trigger="input changed delay:300ms"
               hx-target="#compose-recipient-suggestions"
               hx-swap="innerHTML"
               {/if}/>
        <datalist id="compose-recipient-suggestions"></datalist>
    </div>
    <div class="form-group">
        <label for="compose-title" data-i18n="messaging.compose.threadTitle">Assunto</label>
        <input id="compose-title" name="title" type="text" required maxlength="200"/>
    </div>
    <div class="form-group">
        <label for="compose-body" data-i18n="messaging.compose.message">Mensagem</label>
        <textarea id="compose-body" name="body" rows="8" required maxlength="2000"></textarea>
    </div>
    <div class="form-actions">
        <a href="/account/mailbox" data-hx-get="/account/mailbox"
           hx-select="main"
           hx-target="main"
           hx-swap="outerHTML"
           hx-push-url="/account/mailbox"
           class="btn btn--outline"
           data-i18n="common.cancel">Cancelar</a>
        <button type="submit" class="btn btn--primary" data-i18n="messaging.compose.send">Enviar</button>
    </div>
</form>
