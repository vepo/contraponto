<!DOCTYPE html>
<html>
    {#include components/head seo=seo /}
    <body hx-history-elt>
        {#include components/header /}
        <main id="main-content" class="directory-page">
            <div class="container">
                <h1 class="directory-page__title" data-i18n="directory.authorsTitle">Autores</h1>
                <ul class="directory-page__list">
                    {#for author in authors}
                    <li class="directory-page__item">
                        <a data-hx-get="/{author.username}"
                           hx-select="main"
                           hx-target="main"
                           hx-push-url="/{author.username}"
                           class="directory-page__link">{author.name}</a>
                        <span class="directory-page__meta">@{author.username}</span>
                    </li>
                    {/for}
                </ul>
            </div>
        </main>
        {#include components/footer /}
        {#include components/seo-oob seo=seo /}
    </body>
</html>
