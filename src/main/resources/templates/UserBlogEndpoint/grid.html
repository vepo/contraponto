{#for post in posts.data}
    {#if (ignoreFirst && post_index > 0) || !ignoreFirst}
    <article class="article-card">
        {#if post.cover}
        <div class="article-card__image">
            <a data-hx-get="/{post.author.username}/post/{post.slug}"
                hx-select="main"
                hx-target="main"
                hx-push-url="/{post.author.username}/post/{post.slug}">
                <img src="{post.cover.url}" alt="{post.title}"/>
            </a>
        </div>
        {/if}
        <div class="article-card__content">
            <div class="article-card__category">Article</div>
            <h2 class="article-card__title">
                <a data-hx-get="/{post.author.username}/post/{post.slug}"
                    hx-select="main"
                    hx-target="main"
                    hx-push-url="/{post.author.username}/post/{post.slug}">{post.title}</a>
            </h2>
            <p class="article-card__excerpt">{post.description}</p>
            <div class="article-meta">
                <a data-hx-get="/{post.author.username}"
                    hx-select="main"
                    hx-target="main"
                    hx-push-url="/{post.author.username}">
                    <span class="article-meta__author">{post.author.name}</span>
                    </a>
                <span class="article-meta__dot">•</span>
                <time datetime="{post.publishedAt}">{post.publishedAt.formatDate}</time>
                <span class="article-meta__dot">•</span>
                <span>{post.content.readTime}</span>
            </div>
        </div>
    </article>
    {/if}
{/for}
{#if posts.isLastPage}
<div id="more-posts" class="load-more">
    <button hx-get="/{username}/components/home/grid?page={posts.nextPage}"
            hx-target="#more-posts"
            hx-swap="outerHTML"
            class="btn">Load more</button>
</div>
{/if}
