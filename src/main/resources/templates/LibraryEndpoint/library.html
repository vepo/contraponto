<!DOCTYPE html>
<html>
    {#include components/head}
    My Library - contraponto
    {/include}
    <body hx-history-elt>
        {#include components/header /}
        <main class="drafts-page">
            <div class="container-narrow">
                <h1 class="profile-page__title">My Library</h1>

                <!-- Tabs -->
                <div class="library-tabs">
                    <button class="library-tab library-tab--active" 
                            data-tab="drafts"
                            hx-get="/library/tab?type=drafts"
                            hx-target="#libraryContent"
                            hx-swap="innerHTML"
                            hx-push-url="false">
                        Drafts
                    </button>
                    <button class="library-tab"
                            data-tab="published"
                            hx-get="/library/tab?type=published"
                            hx-target="#libraryContent"
                            hx-swap="innerHTML"
                            hx-push-url="false">
                        Published
                    </button>
                </div>

                <!-- Dynamic content container -->
                <div id="libraryContent" hx-trigger="load" hx-get="/library/tab?type=drafts" hx-swap="innerHTML">
                    <div class="loading-spinner">Loading...</div>
                </div>
            </div>
        </main>

        {#include components/footer /}
    </body>
</html>
