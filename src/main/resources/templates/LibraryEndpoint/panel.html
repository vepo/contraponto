<h2 class="hub-panel__title" data-i18n="library.title">Minha biblioteca</h2>
<p class="hub-panel__subtitle library-page__subtitle" data-i18n="library.subtitle">Rascunhos e publicações em um só lugar.</p>

<div class="library-tabs__row">
    <div class="library-tabs">
        <button type="button" class="library-tab library-tab--active"
                data-tab="drafts"
                hx-get="/writing/library/components/tab/drafts"
                hx-target="#libraryContent"
                hx-swap="innerHTML"
                hx-push-url="false"
                hx-indicator="#library-htmx-indicator" data-i18n="library.tab.drafts">Rascunhos</button>
        <button type="button" class="library-tab"
                data-tab="published"
                hx-get="/writing/library/components/tab/published"
                hx-target="#libraryContent"
                hx-swap="innerHTML"
                hx-push-url="false"
                hx-indicator="#library-htmx-indicator" data-i18n="library.tab.published">Publicados</button>
    </div>
    {#include components/htmx-spinner id='library-htmx-indicator' /}
</div>

<div id="libraryContent" hx-trigger="load" hx-get="/writing/library/components/tab/drafts" hx-swap="innerHTML">
    <div class="loading-spinner" data-i18n="common.loading">Carregando...</div>
</div>
