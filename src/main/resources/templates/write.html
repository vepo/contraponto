<!DOCTYPE html>
<html>
    <head>
        <meta name="csrf-token" content="{{csrfToken}}">
        <link rel="stylesheet" href="/style/main.css"/>
        <link rel="stylesheet" href="/style/write.css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>{#if post}Edit Post{#else}Write a Story{/if} - contraponto</title>
    </head>
    <body class="write-page">
        {#include components/header write=false}
        <button class="btn-header">
            <img src="/images/draft.svg" />
            <span>Draft</span>
        </button>
        <button class="btn-header">
            <img src="/images/publish.svg" />
            <span>Publish</span>
        </button>
        {/include}
        <main class="write-main">
            <div class="write-container">
                <form id="postForm" class="write-form">
                    <input type="hidden" id="postId" name="postId" value="{#if post}{post.id}{/if}"/>
                    
                    <div class="write-form__group">
                        <input type="text" id="title" name="title" class="write-form__title" 
                               placeholder="New story title..." 
                               value="{#if post}{post.title}{/if}"
                               autocomplete="off"/>
                    </div>                    
                    
                    <div class="write-form__group">
                        <input type="text" id="description" name="description" class="write-form__description" 
                               placeholder="Short description (optional)"
                               value="{#if post}{post.description}{/if}"
                               autocomplete="off"/>
                    </div>
                    
                    <div class="write-form__group">
                        <div class="write-editor-toolbar" id="editorToolbar">
                            <button type="button" data-command="bold" title="Bold"><strong>B</strong></button>
                            <button type="button" data-command="italic" title="Italic"><em>I</em></button>
                            <button type="button" data-command="underline" title="Underline"><u>U</u></button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="h2" title="Heading 2">H2</button>
                            <button type="button" data-command="h3" title="Heading 3">H3</button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="ul" title="Bullet List">• List</button>
                            <button type="button" data-command="ol" title="Numbered List">1. List</button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="blockquote" title="Quote">“ Quote</button>
                            <button type="button" data-command="code" title="Code">&lt;/&gt; Code</button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="link" title="Insert Link">🔗 Link</button>
                        </div>
                        <textarea id="content" name="content" class="write-form__editor" 
                                  placeholder="Write your story here...">{#if post}{post.content}{/if}</textarea>
                    </div>
                </form>
            </div>
        </main>

        <!-- Status Toast -->
        <div id="toast" class="toast" style="display: none;">
            <div class="toast__content">
                <span id="toastMessage"></span>
            </div>
        </div>

        {#include components/footer /}

        <script src="/js/write.js"></script>
        <script src="/js/auth.js"></script>
    </body>
</html>
