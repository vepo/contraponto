<!DOCTYPE html>
<html>
    <head>
        <meta name="csrf-token" content="{{csrfToken}}">
        <link rel="stylesheet" href="/style/main.css"/>
        <link rel="stylesheet" href="/style/write.css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>{#if post}Edit Post{#else}Write a Story{/if} - contraponto</title>
    </head>
    <body class="write-page">
        <header class="write-header">
            <div class="write-header__container">
                <div class="write-header__left">
                    <a href="/" class="write-header__logo">contraponto</a>
                </div>
                <div class="write-header__right">
                    <button type="button" class="write-header__btn write-header__btn--secondary" id="saveDraftBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M19 21H5C4.5 21 4 20.5 4 20V4C4 3.5 4.5 3 5 3H16L20 7V20C20 20.5 19.5 21 19 21Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M12 3V8H16M9 15H15M9 11H15" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        Save Draft
                    </button>
                    <button type="button" class="write-header__btn write-header__btn--primary" id="publishBtn">Publish</button>
                    <div class="user-menu" id="userMenu">
                        <button class="user-menu__button" id="userMenuBtn">
                            <div class="user-menu__avatar" id="userAvatar">U</div>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="write-main">
            <div class="write-container">
                <form id="postForm" class="write-form">
                    <input type="hidden" id="postId" name="postId" value="{#if post}{post.id}{/if}"/>
                    
                    <div class="write-form__group">
                        <input type="text" id="title" name="title" class="write-form__title" 
                               placeholder="New story title..." 
                               value="{#if post}{post.title}{/if}"
                               autocomplete="off"/>
                    </div>
                    
                    <div class="write-form__group">
                        <input type="text" id="slug" name="slug" class="write-form__slug" 
                               placeholder="url-slug (auto-generated from title)" 
                               value="{#if post}{post.slug}{/if}"
                               autocomplete="off"/>
                        <div class="write-form__slug-preview" id="slugPreview"></div>
                    </div>
                    
                    <div class="write-form__group">
                        <input type="text" id="description" name="description" class="write-form__description" 
                               placeholder="Short description (optional)"
                               value="{#if post}{post.description}{/if}"
                               autocomplete="off"/>
                    </div>
                    
                    <div class="write-form__group">
                        <div class="write-form__cover" id="coverArea">
                            <div class="write-form__cover-preview" id="coverPreview" style="display: {#if post and post.cover}block{#else}none{/if};">
                                {#if post and post.cover}
                                <img src="{post.cover.url}" alt="Cover image" id="coverImage"/>
                                <button type="button" class="write-form__cover-remove" id="removeCoverBtn">×</button>
                                {/if}
                            </div>
                            <div class="write-form__cover-placeholder" id="coverPlaceholder" style="display: {#if post and post.cover}none{#else}flex{/if};">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                                    <path d="M4 16L8 12L12 16M12 12L20 4M12 12L16 16M16 8H20V12" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                                <span>Add a cover image</span>
                                <small>JPG, PNG, GIF up to 10MB</small>
                            </div>
                            <input type="file" id="coverInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none;"/>
                            <input type="hidden" id="coverId" name="coverId" value="{#if post and post.cover}{post.cover.id}{/if}"/>
                        </div>
                    </div>
                    
                    <div class="write-form__group">
                        <div class="write-editor-toolbar" id="editorToolbar">
                            <button type="button" data-command="bold" title="Bold"><strong>B</strong></button>
                            <button type="button" data-command="italic" title="Italic"><em>I</em></button>
                            <button type="button" data-command="underline" title="Underline"><u>U</u></button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="h2" title="Heading 2">H2</button>
                            <button type="button" data-command="h3" title="Heading 3">H3</button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="ul" title="Bullet List">• List</button>
                            <button type="button" data-command="ol" title="Numbered List">1. List</button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="blockquote" title="Quote">“ Quote</button>
                            <button type="button" data-command="code" title="Code">&lt;/&gt; Code</button>
                            <span class="toolbar-separator"></span>
                            <button type="button" data-command="link" title="Insert Link">🔗 Link</button>
                        </div>
                        <textarea id="content" name="content" class="write-form__editor" 
                                  placeholder="Write your story here...">{#if post}{post.content}{/if}</textarea>
                    </div>
                </form>
            </div>
        </main>

        <!-- Status Toast -->
        <div id="toast" class="toast" style="display: none;">
            <div class="toast__content">
                <span id="toastMessage"></span>
            </div>
        </div>

        <script src="/js/write.js"></script>
        <script src="/js/auth.js"></script>
    </body>
</html>
