{#if authenticated}
<div class="notification-menu" id="notification-menu">
    <button type="button"
            id="notificationBellBtn"
            class="notification-bell"
            aria-label="Notifications"
            aria-expanded="false"
            aria-controls="notificationOverlay"
            aria-haspopup="dialog">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        {#if unreadCount > 0}
        <span class="notification-bell__badge" id="notification-bell-badge">{unreadCount}</span>
        {/if}
    </button>
    <div id="notificationOverlay"
         class="notification-menu__dropdown"
         role="dialog"
         aria-label="Notifications">
        <div class="notification-overlay__placeholder" data-notification-placeholder>
            <header class="notification-overlay__header">
                <div class="notification-overlay__header-text">
                    <h2 class="notification-overlay__title" data-i18n="notifications.title">Notificações</h2>
                </div>
                <button type="button"
                        class="notification-overlay__close"
                        data-notification-close
                        aria-label="Fechar notificações" data-i18n="notifications.close" data-i18n-attr="aria-label">
                    &times;
                </button>
            </header>
            <p class="notification-overlay__empty" data-i18n="notifications.overlay.empty">Nenhuma notificação</p>
        </div>
    </div>
</div>
{/if}
