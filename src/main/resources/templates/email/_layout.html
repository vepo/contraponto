<!DOCTYPE html>
<html lang="{localeLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f5f2;color:#1a1a18;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f6f5f2;padding:24px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#fdfcfa;border:1px solid #d2d1cc;border-radius:4px;overflow:hidden;">
                    <tr>
                        <td style="padding:24px 32px;border-bottom:1px solid #d2d1cc;background-color:#fdfcfa;">
                            <span style="font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:22px;line-height:1.2;color:#3a6b3e;font-weight:600;">{siteName}</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;font-size:15px;line-height:1.6;color:#1a1a18;">
                            {#insert /}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 32px;background-color:#f0efeb;border-top:1px solid #d2d1cc;font-size:12px;line-height:1.5;color:#5a5a56;">
                            {#include email/_account-footer footerReason=footerReason footerSecurityLabel=footerSecurityLabel baseUrl=baseUrl /}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
