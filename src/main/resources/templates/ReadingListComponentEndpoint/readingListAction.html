{#if view.showControls}
<div class="reading-list-action">
    {#if !view.authenticated}
    <button type="button"
            class="btn btn--outline btn--small"
            hx-get="/auth/modal?mode=login"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            data-i18n="reading.saved.signInToSave">Entre para salvar na lista de leitura</button>
    {#else if view.notSaved}
    <form hx-post="/forms/posts/{view.postId}/reading-list"
          hx-target="#post-reading-list"
          hx-swap="innerHTML">
        <button type="submit" class="btn btn--outline btn--small" data-i18n="reading.saved.save">Salvar para ler</button>
    </form>
    {#else}
    <div class="reading-list-action__group">
        <span class="reading-list-action__status btn btn--outline btn--small btn--active">
            {#if view.unread}
            <span data-i18n="reading.saved.savedUnread">Na lista · Não lido</span>
            {#else}
            <span data-i18n="reading.saved.savedRead">Na lista · Lido</span>
            {/if}
        </span>
        {#if view.unread}
        <form hx-post="/forms/reading-list/{view.itemId}/read"
              hx-target="#post-reading-list"
              hx-swap="innerHTML">
            <button type="submit" class="btn btn--outline btn--small" data-i18n="reading.saved.markRead">Marcar como lido</button>
        </form>
        {#else}
        <form hx-post="/forms/reading-list/{view.itemId}/unread"
              hx-target="#post-reading-list"
              hx-swap="innerHTML">
            <button type="submit" class="btn btn--outline btn--small" data-i18n="reading.saved.markUnread">Marcar como não lido</button>
        </form>
        {/if}
        <form hx-delete="/forms/reading-list/{view.itemId}"
              hx-target="#post-reading-list"
              hx-swap="innerHTML">
            <button type="submit" class="btn btn--outline btn--small" data-i18n="reading.saved.remove">Remover da lista</button>
        </form>
    </div>
    {/if}
</div>
{/if}
