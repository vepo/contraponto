<div id="highlightNoteModal" class="modal modal--open highlight-note-modal">
    <div class="modal__container">
        <div class="modal__header">
            <h2 class="modal__title" data-i18n="highlight.note.add">Adicionar nota</h2>
            <button type="button"
                    class="modal__close"
                    data-highlight-note-close
                    aria-label="Close"
                    data-i18n="common.close"
                    data-i18n-attr="aria-label">✕</button>
        </div>
        <div class="modal__body">
            <p class="highlight-note-modal__passage">{passageExcerpt}</p>
            <form hx-post="/forms/highlights/{highlightId}/notes"
                  hx-swap="none"
                  data-highlight-note-form>
                <div class="form-group highlight-note-modal__field">
                    <label for="highlightNoteBody" data-i18n="highlight.note.add">Adicionar nota</label>
                    <textarea id="highlightNoteBody"
                              name="body"
                              class="form-control"
                              rows="4"
                              maxlength="1000"
                              required
                              data-i18n="highlight.note.placeholder"
                              data-i18n-attr="placeholder"></textarea>
                </div>
                <label class="highlight-note-modal__checkbox">
                    <input type="checkbox" name="makePublic" value="true"/>
                    <span data-i18n="highlight.note.makePublic">Tornar nota pública (sujeita à aprovação do autor)</span>
                </label>
                <div class="form-actions u-mt-md">
                    <button type="button" class="btn btn--outline" data-highlight-note-close data-i18n="common.cancel">Cancelar</button>
                    <button type="submit" class="btn btn--primary" data-i18n="common.save">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
