<div class="review-row" id="post-row-{post.id}">
    <div class="review-row__content">
        <span class="review-row__title">{post.liveTitle}</span>
        <span class="review-row__author">by {post.author.name}</span>
        <span class="review-row__date">{post.publishedAt.formatDate}</span>
    </div>
    <div class="review-row__actions">
        <a href="{post.url}"
           target="_blank"
           rel="noopener"
           class="btn btn--outline btn--small review-row__open"
           data-i18n="review.openPost">Abrir publicação</a>
        <button class="btn btn--small {#if post.featured}btn--featured{/if}"
                hx-put="/editor/review/components/{post.id}/featured/toggle"
                hx-target="#post-row-{post.id}"
                hx-swap="outerHTML">
            {#if post.featured}
                <span data-i18n="post.featuredStar">★ Destaque</span>
            {#else}
                <span data-i18n="post.notFeaturedStar">☆ Sem destaque</span>
            {/if}
        </button>
    </div>
</div>
