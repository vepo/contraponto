{#if user.isAuthenticated}
<div class="user-menu">
    <button class="user-menu__button" id="userMenuBtn" aria-label="Menu do usuário" data-i18n="menu.userMenu" data-i18n-attr="aria-label">
        <img src="{user.avatarUrl}" alt="{user.name}" class="user-menu__avatar"/>
        <span>{user.firstName}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
    </button>
    <div class="user-menu__dropdown" id="userDropdown">
        <div class="user-menu__header">
            <div class="user-menu__name">{user.name.escapeHtml}</div>
            <div class="user-menu__email">{user.email.escapeHtml}</div>
        </div>

        <a data-hx-get="/{user.username}"
           hx-select="main"
           hx-target="main"
           hx-push-url="/{user.username}"
           class="user-menu__item user-menu__item--primary"
           data-nav>
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M3 9L12 3L21 9L12 15L3 9Z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M5 9V15L12 20L19 15V9" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
            <span class="user-menu__label" data-i18n="menu.myBlog">Meu blog</span>
        </a>

        <a data-hx-get="/writing"
           hx-select="main"
           hx-target="main"
           hx-swap="outerHTML"
           hx-push-url="/writing"
           class="user-menu__item"
           data-nav>
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="user-menu__label" data-i18n="menu.writing">Escrita</span>
        </a>

        <a data-hx-get="/manage"
           hx-select="main"
           hx-target="main"
           hx-swap="outerHTML"
           hx-push-url="/manage"
           class="user-menu__item"
           data-nav>
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M3 3H21V21H3V3ZM7 7H17V9H7V7ZM7 11H17V13H7V11ZM7 15H13V17H7V15Z" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="user-menu__label" data-i18n="menu.manage">Administrar</span>
        </a>

        <a data-hx-get="/account"
           hx-select="main"
           hx-target="main"
           hx-swap="outerHTML"
           hx-push-url="/account"
           class="user-menu__item"
           data-nav>
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21M16 7C16 9.2 14.2 11 12 11C9.8 11 8 9.2 8 7C8 4.8 9.8 3 12 3C14.2 3 16 4.8 16 7Z" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="user-menu__label" data-i18n="menu.account">Conta</span>
        </a>

        {#if user.isEditor}
        <a data-hx-get="/editor"
           hx-select="main"
           hx-target="main"
           hx-swap="outerHTML"
           hx-push-url="/editor"
           class="user-menu__item"
           data-nav>
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                      stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="user-menu__label" data-i18n="menu.review">Revisão</span>
        </a>
        {/if}

        {#if user.isUserAdministrator}
        <a data-hx-get="/administration"
           hx-select="main"
           hx-target="main"
           hx-swap="outerHTML"
           hx-push-url="/administration"
           class="user-menu__item"
           data-nav>
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M16 21V19C16 16.8 14.2 15 12 15H6C3.8 15 2 16.8 2 19V21M12 11C14.2 11 16 9.2 16 7C16 4.8 14.2 3 12 3C9.8 3 8 4.8 8 7C8 9.2 9.8 11 12 11ZM22 11V9M19 6V4M16 8L14.6 6.6M19.4 6.6L18 8"
                      stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="user-menu__label" data-i18n="menu.administration">Administração</span>
        </a>
        {/if}

        <div class="user-menu__divider"></div>
        <button class="user-menu__item" hx-post="/forms/auth/logout">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M9 21H5C4.5 21 4 20.5 4 20V4C4 3.5 4.5 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="user-menu__label" data-i18n="auth.signOut">Sair</span>
        </button>
    </div>
</div>
{#else}
<div class="auth-buttons">
  <button type="button" class="btn btn--auth-signup"
          hx-get="/auth/modal?mode=signup"
          hx-target="#modal-container"
          hx-swap="innerHTML"
          ><span data-i18n="auth.signUp">Cadastrar-se</span></button>
  <button type="button" class="btn btn--auth-login"
          hx-get="/auth/modal?mode=login"
          hx-target="#modal-container"
          hx-swap="innerHTML"
          ><span data-i18n="auth.signIn">Entrar</span></button>
</div>
{/if}
