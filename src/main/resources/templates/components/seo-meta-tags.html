<meta name="description" content="{seo.description}">
<link rel="canonical" href="{seo.canonicalUrl}">
{#if seo.noindex}
<meta name="robots" content="noindex, nofollow">
{/if}
<meta property="og:site_name" content="Contraponto">
<meta property="og:title" content="{seo.title}">
<meta property="og:description" content="{seo.description}">
<meta property="og:url" content="{seo.canonicalUrl}">
<meta property="og:type" content="{seo.ogType.value}">
<meta property="og:locale" content="{localeLang}">
{#if seo.ogImageUrl.isPresent}
<meta property="og:image" content="{seo.ogImageUrl.get}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{seo.ogImageUrl.get}">
{#else}
<meta name="twitter:card" content="summary">
{/if}
<meta name="twitter:title" content="{seo.title}">
<meta name="twitter:description" content="{seo.description}">
{#if seo.articlePublishedAtIso.isPresent}
<meta property="article:published_time" content="{seo.articlePublishedAtIso.get}">
{/if}
{#if seo.jsonLdRaw.isPresent}
<script type="application/ld+json">{seo.jsonLdRaw.get}</script>
{/if}
