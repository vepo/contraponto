<header class="hub-panel__header">
    <div class="hub-panel__header-text">
        <h2 class="hub-panel__title" {#if titleKey?? && titleKey}data-i18n="{titleKey}"{/if}>{title}</h2>
        {#if subtitle}
        <p class="hub-panel__subtitle" {#if subtitleKey?? && subtitleKey}data-i18n="{subtitleKey}"{/if}>{subtitle}</p>
        {/if}
    </div>
    {#if actionHref?? && actionHref}
    <a href="{actionHref}" data-hx-get="{actionHref}"
       hx-select="main"
       hx-target="main"
       hx-swap="outerHTML"
       hx-push-url="{actionHref}"
       class="btn btn--primary btn--small"
       data-nav
       {#if actionLabelKey?? && actionLabelKey}data-i18n="{actionLabelKey}"{/if}>
        {actionLabel}
    </a>
    {/if}
</header>
