{#if !page.isEmpty && !page.isLastPage}
<div id="more-posts" class="load-more">
    <button hx-get="{hxGet}?page={page.nextPage}"
            hx-target="#more-posts"
            hx-swap="outerHTML"
            class="btn"
            data-i18n="pagination.loadMore">Carregar mais</button>
</div>
{/if}
