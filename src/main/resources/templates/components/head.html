<head>
    <meta name="csrf-token" content="{csrfToken}">
    <meta name="htmx-config" content='{"historyCacheSize": 0, "indicator": "#global-indicator"}'>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style/fonts.css"/>
    <link rel="stylesheet" href="/style/main.css"/>
    <link rel="stylesheet" href="/style/manage.css"/>
    <link rel="stylesheet" href="/style/write.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    {#if rssAlternateUrl?? && rssAlternateUrl}
    <link rel="alternate" type="application/rss+xml" href="{rssAlternateUrl}" title="{rssAlternateTitle.or('RSS')}">
    {/if}
    <script src="/js/third-party/htmx.js"></script>
    <script>
        document.addEventListener('htmx:configRequest', function (evt) {
            var meta = document.querySelector('meta[name="csrf-token"]');
            if (meta && meta.content) {
                evt.detail.headers['X-CSRF-Token'] = meta.content;
            }
        });
    </script>
    <script src="/js/toast.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/reading-time.js"></script>
    <script src="/js/forms.js"></script>
    <script src="/js/authentication.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/write.js"></script>
    <script src="/js/image-upload.js"></script>
    <link rel="stylesheet" href="/style/third-party/default.min.css">
    <script src="/js/third-party/highlight.min.js"></script>
    <script src="/js/third-party/languages/java.min.js"></script>
    <script src="/js/third-party/languages/yaml.min.js"></script>
    <script src="/js/third-party/languages/json.min.js"></script>
    <script src="/js/third-party/languages/bash.min.js"></script>
    <script src="/js/third-party/languages/graphql.min.js"></script>
    <script src="/js/third-party/languages/xml.min.js"></script>
    <script src="/js/third-party/languages/protobuf.min.js"></script>
    <script src="/js/third-party/languages/dockerfile.min.js"></script>
    <script src="/js/third-party/marked.min.js"></script>
    <script src="/js/third-party/asciidoctor.min.js"></script>
    <title>
    {#insert}{/insert}
    </title>
</head>
<div id="modal-container"></div>
<div id="image-lightbox" class="image-lightbox" hidden aria-hidden="true">
    <button type="button" class="image-lightbox__close" aria-label="Close">&times;</button>
    <div class="image-lightbox__backdrop" data-lightbox-close></div>
    <figure class="image-lightbox__figure">
        <img class="image-lightbox__image" alt="" decoding="async">
        <figcaption class="image-lightbox__caption"></figcaption>
    </figure>
</div>
