{#if user.isAuthenticated}
    <button type="button" 
            class="btn btn--header" 
            data-hx-get="/write"
            hx-select="main"
            hx-target="main"
            hx-push-url="/write"
            data-disable-pattern="^/write">
        <img src="/images/write.svg" />
        <span data-i18n="write.title">Escrever</span>
    </button>
    <button id="publish"
            type="button" 
            class="btn btn--header"
            hx-post="/forms/write/publish"
            hx-include="#postForm"
            hx-target="main"
            hx-select="main"
            data-disable-pattern="^(?!(\/write$|\/write\/draft\/\d+$)).*" data-i18n="write.publish">Publicar</button>
    <button id="saveDraft" 
            type="button" 
            class="btn btn--header"
            hx-post="/forms/write/draft"
            hx-include="#postForm"
            hx-swap="none"
            data-disable-pattern="^(?!(\/write$|\/write\/draft\/\d+$)).*" data-i18n="write.saveDraft">Salvar rascunho</button>
{/if}
