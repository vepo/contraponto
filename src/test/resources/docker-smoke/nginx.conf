# Smoke HTTP proxy — derived from contraponto-prod/data/nginx/app.conf (TLS/certbot omitted).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name blogs.commit-mestre.test *.commit-mestre.test;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location / {
        set $contraponto_upstream contraponto:8080;
        proxy_pass http://$contraponto_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /q/health {
        set $contraponto_upstream contraponto:8080;
        proxy_pass http://$contraponto_upstream/q/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        access_log off;
    }

    location /q/metrics {
        set $contraponto_upstream contraponto:8080;
        proxy_pass http://$contraponto_upstream/q/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        access_log off;
    }
}
